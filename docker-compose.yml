services:
  backend:
    build: ./backend
    container_name: prism_backend
    restart: always
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./backend:/code
    environment:
      - TZ=America/Toronto

  worker:
    build: ./backend
    container_name: prism_worker
    restart: always
    command: python -u worker.py
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./backend:/code
    environment:
      - TZ=America/Toronto

  frontend:
    build: ./frontend
    container_name: prism_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000
      - TZ=America/Toronto
    env_file:
      - .env
    stdin_open: true
    tty: true

volumes:
  frontend_node_modules: