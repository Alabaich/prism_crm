# docker-compose.blue.yml — Blue slot
# Backend: host port 8001, Frontend: host port 5174
# PostgreSQL is on the HOST at port 5433 — not in Docker

services:
  backend_blue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prism_backend_blue
    network_mode: host
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8001
    env_file: .env
    environment:
      - SLOT=blue
      - TZ=America/Toronto
    restart: unless-stopped
    volumes:
      - ./backend:/code

  worker_blue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prism_worker_blue
    network_mode: host
    command: python -u worker.py
    env_file: .env
    environment:
      - SLOT=blue
      - TZ=America/Toronto
    restart: unless-stopped
    volumes:
      - ./backend:/code
    depends_on:
      - backend_blue

  frontend_blue:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prism_frontend_blue
    ports:
      - "5174:5173"
    env_file: .env
    environment:
      - SLOT=blue
      - TZ=America/Toronto
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - backend_blue

volumes:
  frontend_node_modules: